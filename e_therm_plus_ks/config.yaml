name: e-Therm Plus KS
slug: e_therm_plus_ks
version: "2.6.48"
description: Termostati virtuali manuali (fonte e-safe) con UI dedicata + MQTT Discovery; PWM/3-rel? in sviluppo
startup: services
boot: auto
build: true

ingress: true
ingress_port: 8080
ingress_entry: /menu
homeassistant_api: true
hassio_api: true

ports:
  8080/tcp: 8080

webui: http://[HOST]:[PORT:8080]/menu

arch:
  - amd64
  - aarch64
  - armv7

options:
  mqtt_host: core-mosquitto
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
  source_prefix: e-safe
  out_prefix: e-therm

  web_auth_mode: none
  web_basic_user: ""
  web_basic_pass: ""
  web_token: ""

  control_interval_sec: 5
  default_profile: WINE_CELLAR

  auto_control_enabled: false
  auto_override_sec: 300

  pwm_kp: 10.0
  pwm_ki: 0.1
  pwm_windup: 100.0
  pwm_deadband: 0.2
  pwm_min_to_med: 34
  pwm_med_to_max: 67

  watchdog_enabled: true
  watchdog_stale_sec: 120

  log_level: MIN
  log_auto_pwm_step: 5
  log_auto_min_sec: 60
  log_temp_delta: 0.5
  log_temp_max_sec: 600
  log_rh_delta: 10
  log_rh_max_sec: 600
  log_ack_timeout_sec: 20
  log_file_max_kb: 2048

schema:
  mqtt_host: str
  mqtt_port: int
  mqtt_user: str?
  mqtt_password: password?
  source_prefix: str
  out_prefix: str

  web_auth_mode: list(none|basic|token)
  web_basic_user: str?
  web_basic_pass: password?
  web_token: password?

  control_interval_sec: int
  default_profile: list(WINE_CELLAR|HOUSE_ECO|HOUSE_COMFORT)

  auto_control_enabled: bool
  auto_override_sec: int

  pwm_kp: float
  pwm_ki: float
  pwm_windup: float
  pwm_deadband: float
  pwm_min_to_med: int
  pwm_med_to_max: int

  watchdog_enabled: bool
  watchdog_stale_sec: int

  log_level: list(MIN|NORMAL|DEBUG)
  log_auto_pwm_step: int
  log_auto_min_sec: int
  log_temp_delta: float
  log_temp_max_sec: int
  log_rh_delta: float
  log_rh_max_sec: int
  log_ack_timeout_sec: int
  log_file_max_kb: int
